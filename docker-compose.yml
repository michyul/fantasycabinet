services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-3001}:3000"
    depends_on:
      - api

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - api
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fantasycabinet
      POSTGRES_USER: fantasycabinet
      POSTGRES_PASSWORD: fantasycabinet
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"

volumes:
  pg_data:
